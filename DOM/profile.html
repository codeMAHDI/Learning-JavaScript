<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | FreshMart</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar (Same as Index for consistency) -->
    <header id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-basket-shopping"></i> FreshMart
            </a>
            
            <div class="search-bar">
                <input type="text" placeholder="Search for groceries, fruits, vegetables...">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="nav-icons">
                <a href="wishlist.html" class="icon-wrapper" title="Wishlist">
                    <i class="fa-regular fa-heart"></i>
                </a>
                <a href="orders.html" class="icon-wrapper" title="My Orders">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="badge">3</span>
                </a>
                <a href="profile.html" class="icon-wrapper" style="color: var(--primary);" title="Profile">
                    <i class="fa-solid fa-user"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- Profile Section -->
    <section class="profile-container">
        
        <!-- Left Sidebar -->
        <div class="profile-sidebar">
            <div class="profile-cover"></div>
            <div class="profile-info">
                <div class="profile-pic-container">
                    <img src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg?auto=compress&cs=tinysrgb&w=300" alt="Profile Picture" id="profileImagePreview">
                    <div class="upload-btn" title="Change Picture" onclick="document.getElementById('fileUpload').click()">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                    <input type="file" id="fileUpload" style="display: none;" accept="image/*">
                </div>
                <h3>Moshiur Rahman</h3>
                <p>moshiur@example.com</p>
            </div>

            <div class="profile-menu">
                <button class="active" onclick="switchTab('editProfile', this)"><i class="fa-regular fa-id-badge"></i> Edit Profile</button>
                <button onclick="switchTab('changePassword', this)"><i class="fa-solid fa-lock"></i> Change Password</button>
                <a href="orders.html"><i class="fa-solid fa-box"></i> My Orders</a>
                <a href="wishlist.html"><i class="fa-regular fa-heart"></i> Wishlist</a>
                <a href="#" class="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a>
            </div>
        </div>

        <!-- Right Content Area -->
        <div class="profile-content">
            
            <!-- Tab 1: Edit Profile -->
            <div id="editProfile" class="tab-content active">
                <h2>Personal Information</h2>
                <form onsubmit="event.preventDefault(); showProfileToast('Profile updated successfully!');">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" value="Moshiur" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" value="Rahman" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" value="moshiur@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" value="+880 1234 567890">
                        </div>
                        <div class="form-group full-width">
                            <label>Delivery Address</label>
                            <input type="text" value="123 Super Shop St, NY, USA">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 10px;">Save Changes</button>
                </form>
            </div>

            <!-- Tab 2: Change Password -->
            <div id="changePassword" class="tab-content">
                <h2>Security Settings</h2>
                <form onsubmit="event.preventDefault(); showProfileToast('Password changed successfully!');">
                    <div class="form-group full-width">
                        <label>Current Password</label>
                        <input type="password" placeholder="Enter current password" required>
                    </div>
                    <div class="form-group full-width">
                        <label>New Password</label>
                        <input type="password" placeholder="Enter new password" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Confirm New Password</label>
                        <input type="password" placeholder="Confirm your new password" required>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 10px; background: #3b82f6;">Update Password</button>
                </form>
            </div>

        </div>
    </section>

    <!-- Beautiful Top Toast Notification -->
    <div id="profileToast" class="custom-toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMessage">Success!</span>
    </div>

    <!-- Script for Tab Switching & Profile Image Upload -->
    <script>
        // Tab Switcher logic
        function switchTab(tabId, btnElement) {
            // Remove active class from all tabs & buttons
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.profile-menu button').forEach(btn => btn.classList.remove('active'));
            
            // Add active class to clicked tab & button
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        // Profile Toast logic (Top Position)
        function showProfileToast(message) {
            const toast = document.getElementById('profileToast');
            document.getElementById('toastMessage').innerText = message;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Dummy Profile Image Upload
        const fileUpload = document.getElementById('fileUpload');
        const profileImg = document.getElementById('profileImagePreview');
        
        fileUpload.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileImg.src = e.target.result;
                    showProfileToast('Profile picture updated!');
                }
                reader.readAsDataURL(this.files[0]);
            }
        });
    </script>
</body>
</html>
